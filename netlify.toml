[build]
  functions = "netlify/functions"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/install"
  to = "/install/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/install/"
  to = "/install/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/billing"
  to = "/billing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/billing/"
  to = "/billing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/collections"
  to = "/.netlify/functions/collections"
  status = 200
  force = true

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200
  force = true

[[redirects]]
  from = "/api/master-schedule-write"
  to = "/.netlify/functions/master-schedule-write"
  status = 200
  force = true
