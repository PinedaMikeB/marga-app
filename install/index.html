<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f6df2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MARGA">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <title>Install Marga App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="install.css">
</head>
<body>
    <main class="install-shell">
        <section class="install-card">
            <img class="logo-badge" src="/assets/icons/icon-192.png" alt="MARGA logo">
            <p class="eyebrow">Marga App</p>
            <h1>Install Marga App</h1>
            <p class="subtitle">Open this in Safari or Chrome, then add Marga to your home screen.</p>
            <button id="openInstallBtn" class="install-btn" type="button">Open Installer</button>
            <p id="fallbackText" class="fallback-text hidden">
                If it does not open automatically, choose <strong>Open in Safari</strong> or <strong>Open in Chrome</strong>.
            </p>
            <button id="copyLinkBtn" class="copy-btn hidden" type="button">Copy Link</button>
        </section>
    </main>

    <script type="module" src="install.js"></script>
</body>
</html>
