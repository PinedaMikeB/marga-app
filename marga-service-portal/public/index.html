<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MARGA Care" />
  <title>MARGA Care Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/public/manifest.json" />
  <link rel="icon" type="image/png" href="/public/assets/icons/marga-logo-theme.png" />
  <link rel="shortcut icon" type="image/png" href="/public/assets/icons/marga-logo-theme.png" />
  <link rel="apple-touch-icon" href="/public/assets/icons/marga-logo-theme.png" />
  <link rel="stylesheet" href="/src/styles/app.css?v=20260703-device-grid-custom-21" />
  <link rel="stylesheet" href="/src/styles/portal.css?v=20260703-device-grid-custom-21" />
</head>
<body>
  <div class="ambient-bg" aria-hidden="true"></div>

  <section id="authView" class="auth-view">
    <div class="auth-card glass">
      <header class="auth-brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>MARGA <span>Care Portal</span></h1>
          <p>Request support, track updates, and keep your service and billing proof in one place.</p>
        </div>
      </header>
      <form id="loginForm" class="auth-form">
        <label>
          Login
          <input type="text" name="login" required autocomplete="username" placeholder="Email or company code" />
        </label>
        <label>
          Password
          <input type="password" name="password" required autocomplete="current-password" placeholder="Password" minlength="6" />
        </label>
        <button class="btn btn-primary" type="submit">Sign In</button>
      </form>
      <p class="auth-note" id="authMessage">Use your approved Marga Care account to request, track, and verify support.</p>
      <p class="auth-note" style="margin-top:.6rem">New user? <a href="/register.html" style="color:#4f46e5;font-weight:700;text-decoration:none">Register your branch here →</a></p>
    </div>
  </section>

  <section id="portalView" class="app-shell hidden" aria-live="polite">
    <aside class="sidebar glass-strong" id="portalSidebar">
      <div class="sidebar-header">
        <div class="logo-pill">
          <img class="sidebar-logo-mark" src="/public/assets/icons/marga-logo-theme.png" alt="MARGA logo" />
          <div>
            <div class="logo-title">MARGA</div>
            <div class="logo-subtitle">Care Portal</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav" id="portalNav"></nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar" id="userAvatar">U</div>
          <div>
            <p id="userName">User</p>
            <span id="userRole">Role</span>
          </div>
        </div>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </aside>

    <main class="main-wrap">
      <header class="topbar glass">
        <button id="menuToggle" class="icon-btn" aria-label="Toggle menu">☰</button>
        <div>
          <h2 id="viewTitle">Home</h2>
          <p id="viewSubtitle">Customer care overview</p>
        </div>
        <div class="top-actions">
          <a class="top-icon call-icon" href="tel:+63281234567" aria-label="Call Marga"><img src="/public/assets/icons/call.png" alt="" /></a>
          <a class="top-icon chat-icon" href="mailto:support@marga.biz" aria-label="Chat with Marga"><img src="/public/assets/icons/chat.png" alt="" /></a>
          <button id="installBtn" class="btn btn-secondary hidden" type="button" disabled aria-hidden="true">Install App</button>
          <span id="syncBadge" class="status-badge">Online</span>
        </div>
      </header>

      <section id="announcements" class="panel glass"></section>
      <section id="viewContainer" class="view-grid"></section>
    </main>

    <nav class="bottom-nav glass-strong" id="bottomNav"></nav>
  </section>

  <template id="tableTemplate">
    <div class="panel glass">
      <div class="panel-head">
        <h3></h3>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </template>

  <script src="/public/config.js"></script>
  <script type="module" src="/src/portal-main.js?v=20260710-device-filter-1"></script>
</body>
</html>
